version: 0.2
phases:  
  install:
    commands:
      - echo "Installing Gitleaks..."
      - apt install wget tar -y
      - wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
      - tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
      - chmod +x gitleaks
      - mv gitleaks /usr/local/bin/
      
  pre_build:
    commands:
      - echo "Scanning for any leaks"
      - gitleaks detect --source . --no-git || exit 1
      - echo "No leaks found"
      - docker build -t nodeimage .
      - docker tag nodeimage:latest 977527528431.dkr.ecr.ap-south-1.amazonaws.com/backend:latest
      - docker images
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 977527528431.dkr.ecr.ap-south-1.amazonaws.com
      - docker push 977527528431.dkr.ecr.ap-south-1.amazonaws.com/backend:latest
  build:
    commands:
artifacts:
  files: 
    - '**/*'              # Includes all files and subdirectories from the root directory.
    - 'appspec.yml'          # Includes the appspec.yml file
    - 'scripts/**' 
